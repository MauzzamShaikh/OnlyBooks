<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - OnlyBooks</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Login Section -->
    <section class="login-section">
        <div class="container">
            <div class="login-container">
                <div class="login-card">
                    <div class="login-header">
                        <h2 id="formTitle">Welcome Back</h2>
                        <p id="formSubtitle">Login to access your account</p>
                    </div>

                    <!-- Login Form -->
                    <form id="loginForm" class="auth-form">
                        <div class="form-group">
                            <label for="loginEmail">Email Address</label>
                            <input type="email" id="loginEmail" name="email" placeholder="Enter your email" required>
                        </div>
                        <div class="form-group">
                            <label for="loginPassword">Password</label>
                            <input type="password" id="loginPassword" name="password" placeholder="Enter your password" required autocomplete="current-password">
                        </div>
                        <button type="submit" class="btn-primary btn-block">Login</button>
                    </form>

                    <!-- Registration Form -->
                    <form id="registerForm" class="auth-form hidden">
                        <div class="form-group">
                            <label for="registerName">Full Name</label>
                            <input type="text" id="registerName" name="name" placeholder="Enter your full name" required>
                        </div>
                        <div class="form-group">
                            <label for="registerEmail">Email Address</label>
                            <input type="email" id="registerEmail" name="email" placeholder="Enter your email" required>
                        </div>
                        <div class="form-group">
                            <label for="registerPassword">Password</label>
                            <input type="password" id="registerPassword" name="password" placeholder="Create a password" required autocomplete="new-password">
                        </div>
                        <div class="form-group">
                            <label for="registerConfirmPassword">Confirm Password</label>
                            <input type="password" id="registerConfirmPassword" name="confirmPassword" placeholder="Confirm your password" required autocomplete="new-password">
                        </div>
                        <button type="submit" class="btn-primary btn-block">Register</button>
                    </form>

                    <div class="form-footer">
                        <p id="toggleText">
                            Don't have an account? 
                            <a href="javascript:void(0)" id="toggleForm" class="toggle-link">Register here</a>
                        </p>
                    </div>
                </div>

                <div class="login-illustration">
                    <svg width="100%" height="100%" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                        <circle cx="200" cy="200" r="150" fill="#FFF5F5"/>
                        <rect x="120" y="100" width="160" height="200" rx="8" fill="#FF6B6B"/>
                        <rect x="130" y="110" width="140" height="180" rx="4" fill="white"/>
                        <line x1="150" y1="140" x2="250" y2="140" stroke="#FF6B6B" stroke-width="3"/>
                        <line x1="150" y1="160" x2="240" y2="160" stroke="#FFCCCB" stroke-width="2"/>
                        <line x1="150" y1="175" x2="240" y2="175" stroke="#FFCCCB" stroke-width="2"/>
                        <line x1="150" y1="190" x2="240" y2="190" stroke="#FFCCCB" stroke-width="2"/>
                        <circle cx="320" cy="120" r="20" fill="#FFD93D"/>
                        <circle cx="80" cy="280" r="15" fill="#6BCF7F"/>
                    </svg>
                </div>
            </div>
        </div>
    </section>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2025 OnlyBooks. All rights reserved.</p>
            <p>Powered by Google Books API</p>
        </div>
    </footer>

    <script src="header.js"></script>
    <script src="script.js"></script>
</body>
</html>
