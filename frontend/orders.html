<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order History - OnlyBooks</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Orders Section -->
    <section class="orders-section">
        <div class="container">
            <h2 class="page-title">Order History</h2>
            
            <div class="orders-content">
                
                <!-- Orders List -->
                <div class="orders-list" id="ordersList">
                    <!-- Empty State -->
                    <div class="empty-orders">
                        <svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                            <circle cx="60" cy="60" r="50" stroke="#E0E0E0" stroke-width="4"/>
                            <path d="M40 40H80L75 75H45L40 40Z" stroke="#E0E0E0" stroke-width="3"/>
                            <circle cx="52" cy="85" r="5" stroke="#E0E0E0" stroke-width="3"/>
                            <circle cx="68" cy="85" r="5" stroke="#E0E0E0" stroke-width="3"/>
                        </svg>
                        <h3>No orders yet</h3>
                        <p>Your order history will appear here</p>
                        <a href="index.html" class="btn-primary">Start Shopping</a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div id="toast" class="toast"></div>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2025 OnlyBooks. All rights reserved.</p>
            <p>Powered by Google Books API</p>
        </div>
    </footer>

    <script src="header.js"></script>
    <script src="script.js"></script>
</body>
</html>
